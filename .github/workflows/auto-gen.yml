name: 🤖 Auto Generate QA Posts

on:
  schedule:
    # Chạy tự động tại phút thứ 17 hằng giờ
    - cron: '17 * * * *'  
  workflow_dispatch: # Cho phép sếp chủ động bấm chạy bằng tay trên GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 🚀 TỐI ƯU: Đồng bộ lên Node 22 cho mượt mà
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci # 🚀 TỐI ƯU: Thay thế npm install bằng npm ci để tăng tốc độ cài đặt

      - name: 🔑 Create .env.local from GitHub Secrets
        env:
          ENV_CONTENT: ${{ secrets.ENV_LOCAL }}
        run: |
          echo "$ENV_CONTENT" > .env.local

      # ĐÃ CHUẨN HÓA: Gọi file điều phối mẻ lớn run-all-keys để quét sạch từ Key 1 đến Key 24
      - name: 🚀 Run smart generation script pipeline
        run: |
          # 1. Quét dữ liệu cũ để cập nhật file JSON trước
          node scripts/generate-posts.mjs
          
          # 2. KHỞI ĐỘNG MẺ CHẠY FULL 24 KEYS CÙNG LÚC HẰNG GIỜ
          npx tsx scripts/run-all-keys.ts
          
          # 3. Nén lại file JSON để cập nhật thanh tìm kiếm trên giao diện web
          node scripts/generate-posts.mjs

      # 🚀 TỐI ƯU: Chuyển sang dùng bot commit chuyên dụng. 
          # 💾 Auto Commit & Push generated posts
      - name: 💾 Auto Commit & Push generated posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-generated a batch of new QA posts [skip ci]"
          # SỬA TẠI ĐÂY: Thêm topics.txt và done_topics.txt vào cuối pattern
          file_pattern: 'content/posts/*.md public/content/posts.generated.json topics.txt done_topics.txt'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"