name: 🤖 Auto Generate QA Posts

on:
  schedule:
    - cron: '0 * * * *' # Cứ mỗi 1 tiếng hệ thống sẽ tự động thức dậy chạy 1 lần
  workflow_dispatch: # Cho phép sếp chủ động bấm chạy bằng tay trên GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔑 Create .env.local from GitHub Secrets
        env:
          ENV_CONTENT: ${{ secrets.ENV_LOCAL }}
        run: |
          echo "$ENV_CONTENT" > .env.local

      # ĐÃ CHUẨN HÓA: Gọi file điều phối mẻ lớn run-all-keys để quét sạch từ Key 1 đến Key 24
      - name: 🚀 Run smart generation script pipeline
        run: |
          # 1. Quét dữ liệu cũ để cập nhật file JSON trước
          node scripts/generate-posts.mjs
          
          # 2. KHỞI ĐỘNG MẺ CHẠY FULL 24 KEYS CÙNG LÚC HẰNG GIỜ
          npx tsx scripts/run-all-keys.ts
          
          # 3. Nén lại file JSON để cập nhật thanh tìm kiếm trên giao diện web
          node scripts/generate-posts.mjs

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🤖 Auto-generated a batch of new QA posts [skip ci]" || echo "No changes to commit"
          git push