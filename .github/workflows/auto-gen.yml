name: 🤖 Auto Generate QA Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔑 Create .env.local from GitHub Secrets
        run: |
          echo "${{ secrets.ENV_LOCAL }}" > .env.local

      - name: 🚀 Run generation script (Run ALL Keys)
        run: npm run gen:all

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🤖 Auto-generated a batch of new QA posts" || echo "No changes to commit"
          git push