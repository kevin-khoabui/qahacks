name: 🚀 Daily Cloudflare Build & Deploy Automation

on:
  schedule:
    - cron: '30 1 * * *' # Đúng 01:30 sáng hằng ngày theo giờ UTC (08:30 sáng giờ Việt Nam)
  workflow_dispatch:     # Cho phép bạn bấm nút chạy bằng tay trên giao diện GitHub bất cứ lúc nào

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Kéo toàn bộ mã nguồn sạch mới nhất từ GitHub về server chạy ngầm
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Node.js chuẩn khớp với máy Mac của bạn
      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Khớp đét với Node 22.x trên hệ thống của bạn

      # Bước 3: Cài đặt sạch gói dependencies (Chống dính rác cache node_modules cũ)
      - name: 📦 Install Project Dependencies
        run: npm ci --progress=false

      # Bước 4: Chạy đồng bộ nén dữ liệu thật ra file JSON tổng cục
      - name: 📝 Generate Posts Database JSON
        run: |
          node scripts/generate-posts.mjs
          npx tsx scripts/aggregate.ts

      # Bước 5: Cưỡng bức xóa bạo lực .next cache và Biên dịch Next.js sang thư mục tĩnh 'out'
      - name: 🏗️ Compiling Next.js Static Export
        run: |
          rm -rf .next out
          npm run build

      # Bước 6: Dùng Wrangler đẩy thẳng thư mục 'out' siêu sạch lên Cloudflare Pages
      - name: ⚡ Deploy directly to Cloudflare Pages via Wrangler
        run: npx wrangler pages deploy out --project-name=qahacks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }} # Bạn cấu hình Token này trong mục Settings > Secrets của GitHub nhé