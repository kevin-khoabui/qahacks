name: 📦 Auto Aggregate Milestones (Top 10-50)

on:
  schedule:
    - cron: '0 0 * * *' # Đúng 00:00 nửa đêm hệ thống sẽ thức dậy quét mốc chẵn
  workflow_dispatch: # Cho phép bấm chạy bằng tay bất cứ lúc nào

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔑 Create .env.local from GitHub Secrets
        env:
          ENV_CONTENT: ${{ secrets.ENV_LOCAL }}
        run: |
          echo "$ENV_CONTENT" > .env.local

      - name: 🚀 Run aggregation script
        run: |
          # 1. Quét cập nhật kho dữ liệu trước
          node scripts/generate-posts.mjs
          
          # 2. Chạy file kiểm tra mốc chẵn để gộp bài Compilation tổng hợp
          npx ts-node scripts/aggregate.ts
          
          # 3. Đồng bộ lại file JSON đầu ra lần cuối
          node scripts/generate-posts.mjs

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🤖 Auto-aggregated check mốc chẵn [skip ci]" || echo "No changes to commit"
          git push