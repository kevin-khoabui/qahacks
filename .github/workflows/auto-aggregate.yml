name: Auto Aggregate Daily Mega Posts

on:
  schedule:
    # Chạy tự động vào lúc 00:00 UTC hằng ngày (khoảng 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  # Cho phép bấm nút chạy bằng tay trên giao diện GitHub Actions bất cứ lúc nào
  workflow_dispatch:

jobs:
  aggregate-and-commit:
    runs-on: ubuntu-latest
    # 🚀 FIX LỖI CHÍ MẠNG: Cấp quyền ghi để bot có thể push bài gộp lên repo không bị dính lỗi 403
    permissions:
      contents: write

    steps:
      # 1. Lấy toàn bộ mã nguồn mới nhất từ repo về máy ảo
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Cài đặt môi trường NodeJS (Đồng bộ lên bản 22 như daily-build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 
          cache: 'npm'       

      # 3. Cài đặt sạch gói dependencies (Tốc độ cao và an toàn)
      - name: Install Dependencies
        run: npm ci

      # 4. Kích nổ cỗ máy gộp bài cơ khí (Nhặt bài lẻ, tự đánh số, tạo file .md mới)
      - name: Run Aggregate Script
        run: npx tsx scripts/aggregate.ts

      # 5. Chạy đồng bộ nén lại kho dữ liệu JSON tĩnh công cộng cho Next.js
      - name: Generate Static Posts JSON
        run: node scripts/generate-posts.mjs

      # 6. Dùng Bot chuyên dụng để tự động kiểm tra, commit và push sạch sẽ
      - name: Auto Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-aggregate daily mega post [skip ci]"
          file_pattern: 'content/posts/*.md public/content/posts.generated.json topics_top.txt done_topics_top.txt'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"