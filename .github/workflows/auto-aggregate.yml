name: 📦 Auto Aggregate Milestones (Top 10-50 Daily)

on:
  schedule:
    - cron: '0 0 * * *' # Đúng 00:00 nửa đêm UTC hằng ngày hệ thống tự thức dậy cày 1 bài Top
  workflow_dispatch: # Cho phép sếp bấm chạy bằng tay bất cứ lúc nào trên GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔑 Create .env.local from GitHub Secrets
        env:
          ENV_CONTENT: ${{ secrets.ENV_LOCAL }}
        run: |
          echo "$ENV_CONTENT" > .env.local

      - name: 🚀 Run aggregation script
        run: |
          # 1. Quét dữ liệu cũ để đồng bộ file JSON trước
          node scripts/generate-posts.mjs
          
          # 2. Gọi cỗ máy gộp bài Collection Daily bốc đạn từ topics_top.txt
          npx tsx scripts/aggregate.ts
          
          # 3. Nén lại file JSON đầu ra lần cuối để cập nhật giao diện tìm kiếm trên web
          node scripts/generate-posts.mjs

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🤖 Auto-aggregated a new Top Collection post [skip ci]" || echo "No changes to commit"
          git push